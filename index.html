<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Quick Image Resizer (Hybrid Export)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; background: #1a1a1a; color: #fff; overflow: hidden; }
        #drop-zone { 
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            border: 4px dashed #333; margin: 30px; border-radius: 30px; cursor: pointer; 
            transition: all 0.3s;
        }
        #drop-zone:hover { border-color: #3498db; background: #222; }
        #drop-zone.hover { border-color: #3498db; background: #252525; transform: scale(1.01); }
        .plus-icon { font-size: 50px; margin-bottom: 15px; color: #444; }
        #status { text-align: center; padding: 20px; font-weight: bold; color: #3498db; font-size: 1.2em; min-height: 1.2em; }
        canvas { display: none; }
    </style>
</head>
<body>

    <div id="drop-zone">
        <div class="plus-icon">+</div>
        <div style="font-size: 1.5em; font-weight: bold;">IMAGES DROP HERE</div>
        <div style="margin-top: 10px; color: #888;">PNG/JPG 자동 분류 및 9종 일괄 추출</div>
    </div>
    
    <div id="status"></div>
    <input type="file" id="file-input" accept="image/*" style="display: none;">
    <canvas id="canvas"></canvas>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const status = document.getElementById('status');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // 규격 리스트 (type 추가: png 또는 jpeg)
    const targetSpecs = [
        { w: 1000, h: 1000, name: '1000_x', type: 'image/jpeg' },
        { w: 1200, h: 750,  name: '1200_x', type: 'image/jpeg' },
        { w: 650,  h: 400,  name: 'y_rolling_banner', type: 'image/jpeg' },
        { w: 720,  h: 360,  name: 'cardview', type: 'image/jpeg' },
        { w: 1080, h: 720,  name: 'c_rolling_banner_x', type: 'image/jpeg' },
        { w: 900,  h: 600,  name: 'kk_banner', type: 'image/jpeg' },
        { w: 500,  h: 500,  name: 'e_PC배너', type: 'image/png' },
        { w: 640,  h: 278,  name: 'e_모바일배너', type: 'image/png' },
        { w: 1920, h: 1152, name: 'k_rolling_banner', type: 'image/jpeg' }
    ];

    dropZone.onclick = () => fileInput.click();
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('hover'); };
    dropZone.ondragleave = () => dropZone.classList.remove('hover');
    dropZone.ondrop = (e) => { e.preventDefault(); dropZone.classList.remove('hover'); handleFile(e.dataTransfer.files[0]); };
    fileInput.onchange = (e) => handleFile(e.target.files[0]);

    async function handleFile(file) {
        if (!file || !file.type.startsWith('image/')) return;

        status.innerText = "⚡ 하이브리드 규격 추출 중 (JPG/PNG)...";
        const zip = new JSZip();
        const originalName = file.name.substring(0, file.name.lastIndexOf('.'));

        for (const spec of targetSpecs) {
            canvas.width = spec.w;
            canvas.height = spec.h;
            
            const blob = await processImageFill(file, spec.w, spec.h, spec.type);
            const ext = spec.type === 'image/png' ? 'png' : 'jpg';
            const fileName = `${spec.name}.${ext}`;
            zip.file(fileName, blob);
        }

        const content = await zip.generateAsync({type: "blob"});
        const zipLink = document.createElement('a');
        zipLink.href = URL.createObjectURL(content);
        zipLink.download = `${originalName}_hybrid_bundle.zip`;
        zipLink.click();

        status.innerText = "✅ 작업 완료!";
        setTimeout(() => { status.innerText = ""; }, 3000);
    }

    function processImageFill(file, targetW, targetH, mimeType) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    ctx.clearRect(0, 0, targetW, targetH);
                    
                    // PNG일 경우 투명도를 위해 배경색을 채우지 않고, JPG일 경우만 흰색 배경을 채움
                    if (mimeType === 'image/jpeg') {
                        ctx.fillStyle = "white";
                        ctx.fillRect(0, 0, targetW, targetH);
                    }

                    let scale = Math.max(targetW / img.width, targetH / img.height);
                    let w = img.width * scale;
                    let h = img.height * scale;
                    let x = (targetW - w) / 2;
                    let y = (targetH - h) / 2;
                    ctx.drawImage(img, x, y, w, h);
                    
                    // 품질 설정 (JPG는 0.8 압축, PNG는 무손실)
                    const quality = mimeType === 'image/jpeg' ? 0.8 : 1.0;
                    canvas.toBlob((blob) => resolve(blob), mimeType, quality);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }
</script>
</body>
</html>
